<svg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
  <!-- Montre -->
  <circle cx="10" cy="5.4" r="4.5" fill="none" stroke="#ffffff" stroke-width="1"/>

  <!-- Aiguille des minutes -->
  <line x1="10" y1="5.4" x2="10" y2="1.2" stroke="#ffffff" stroke-width="1" stroke-linecap="round"/>

  <!-- Aiguille des heures (courte, vers 4h) -->
  <line x1="10" y1="5.4" x2="11.9" y2="7" stroke="#ffffff" stroke-width="1" stroke-linecap="round"/>

  <!-- Curseur horizontal -->
  <!-- rail -->
  <line x1="0.5" y1="16.5" x2="19.5" y2="16.5"
        stroke="#ffffff" stroke-width="1" stroke-linecap="round"/>

  <!-- ticks -->
  <line x1="2.5" y1="15.8" x2="2.5" y2="17.2" stroke="#ffffff" stroke-width="1" stroke-linecap="round"/>
  <line x1="6.5" y1="15.8" x2="6.5" y2="17.2" stroke="#ffffff" stroke-width="1" stroke-linecap="round"/>
  <line x1="10" y1="15.8" x2="10" y2="17.2" stroke="#ffffff" stroke-width="1" stroke-linecap="round"/>
  <line x1="13.5" y1="15.8" x2="13.5" y2="17.2" stroke="#ffffff" stroke-width="1" stroke-linecap="round"/>
  <line x1="17.5" y1="15.8" x2="17.5" y2="17.2" stroke="#ffffff" stroke-width="1" stroke-linecap="round"/>

  <!-- curseur (plus étiré vers le bas) -->
  <path d="M13.6 17.4 L13.6 15.6 L14.5 14.5 L15.4 15.6 L15.4 17.4 Z"
        fill="#ffffff" stroke="#ffffff" stroke-width="1"
        stroke-linejoin="round"/>
</svg>